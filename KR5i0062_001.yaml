body:
  text: 附録五篇靈文重陽祖師注淸虛道人録序斯文乃金丹之至寶非其人而不可傳也若上根上器大德之子得遇此書修仙之正路耳重陽注曰仙有五等鬼仙不足取人仙不必論地仙住世長年神仙出有入無隱顯莫測身外有身能二其身者是謂神仙天仙者列於神仙之上學道之士勿為中下之徒當學最上一乘之真法無上至極之妙道洞曉天地陰陽深達五行造化陰陽二字理莫大焉天地日月五行由此而化太極既判淸氣上升在天成象濁氣下降在地成形木火之精為太陽金水之華為太陰天地日月感二氣而化成也此二氣互運於天地之間周流不已化生萬類然人之生也稟父精母血天之陽氣地之陰氣日之陽魂月之陰魄火之陽神水之陰精人之一身造化與天地同一氣也天地乃人之大父母悟之者超乎天地陰陽之外迷之者罹乎苦海萬象之中不被五行之所拘陰陽之所縛是謂上品天仙不悟之者與造物同淪悲哉以天心為主以元神為用重陽注曰天心者妙圓之真心也釋氏所謂妙明真心心本妙明無染無著淸淨之體稍有染著即名之妄也此心是太極之根虛無之體陰陽之祖天地之心故曰天心也元神者乃不生不滅無朽無壞之真靈非思慮妄想之心天心乃元神之主宰元神乃天心之妙用故以如如不動妙圓天心為主以不壞不滅靈妙元神為用也以三寶為基外三寶不漏內三寶自合也重陽注曰內三寶者精氣神是也外三寶者耳目口是也須以耳目口閉塞勿發通目視色則神從目漏耳聽聲則精從耳漏口開言則氣從口漏視聽言時動於外則精氣神日耗於內漸漸衰老耗盡則死所謂固三寶者目不妄視耳不妄聽口不妄言是為外三寶不漏也目不視而神在心耳不聽而精在腎口不言而氣在丹田是為內三寶自合也始得天人感通先天之氣自然歸之重陽注曰天者先天氣也人者後天形也修仙之士若常涵養如如不動之天心靈妙不昧之元神行住坐卧攝於玄關一竅之中自然目不妄視耳不妄聽口不妄言內真外應先天之氣自然感通歸於吾身矣然人之一身內外四大上下皆屬後天陰陽惟有先天一點至陽之氣混於杳冥不測之內至虛至靈難求難見重陽注曰人之一身外有四肢百骸內有五臟六腑至於涕唾津精氣血液者俱是有形之物皆屬後天陰濁這點至陽之氣即先天真一之氣謂太乙含真氣是也恍惚杳冥者指先天發生之所也欲先天至陽之氣發現別無他術只是一靜之工夫耳靜工之道只在去妄念上做工夫觀一身皆空寂然不動之中忽然一點真陽發現於恍惚之中若有若無杳冥之內難測難窺非內非外不知所以然而然者也雖然外來實由內孕重陽注曰萬物負陰而抱陽人之一身四大雖屬陰濁內含一點先天元陽本自良知良能本妙本明因人七情六欲攻於內寒勞暑役伐於外以致元陽散盡而不知覺悟隨造化而淪沒矣知之修煉收視返聽忘物抱真視聽不漏於聲色妙湛不漏於念想真精自固元陽自充內真外應先天一氣自虛無中而來點化身內之金丹故曰雖從外來實由內孕是以母氣而伏子氣神抱於氣氣抱於神當斯之際丹田溫暖三關升降上下冲和醍醐灌頂甘露灑心鈞天妙樂耳中常聞至寶玄珠目中常見此乃真景象也非譬喻也真精既返黃金室一顆明珠永不離豈虛言哉先天若無後天何以招攝後天不得先天豈能變通此乃無中生有有中生無無因有激之而成象有因無感之而通靈先後二天之氣如谷之應聲重陽注曰先天者入於無象後天者滯於有形先天者真淨妙明之心也後天者端嚴具足之形也先天妙明真性本來淸淨無始以來一念垂珠至於今日若不得後天具足之體招攝則陰靈孤渺後天具足之體若不得先天靈妙之元神則不能變化通靈豈能超凡入聖夫性命者神氣之根源也氣者天一之水神者太乙含真性者無中之有象命者有中之虛無命無性不靈性無命不立無者是先天之性神者真一之氣也有者後天之命氣者真一之精也此有形陰質因一點無象陽氣而生此有形之內懷無象之真必假煅煉澄淸方得玄珠顯像玄珠既顯採歸爐內有無混融二氣感通如影之隨形如谷之應聲自然心凝形釋骨月都融形神俱妙與道合真神仙妙用只是採取先天真陽之氣以為金丹之母點化己身陰氣以變純陽之體重陽注曰金丹在內藥從外來實由內孕何也蓋神依形生既有此物一點先天在人身箇箇不無人人本有世人迷真順情情境既熟愛河流浪欲海波深實觀覺悟之者得遇真師指示這先天一氣藥從外來依形而生採取之法只是忘情忘形委志虛無一念不生靜中至寂忽然天光自發不內不外之閒若有一物或明或隱乃玄珠成象玄珠因何而成象皆因靜寂之時神抱於氣氣結精凝結成一粒金丹永在丹田之內外現玄境之象猶如室內之燈光照透窗外之明朗天根月窟閒來往三十六宮都是春待他一點自歸復身中化作四時春溫養丹鼎光透簾幃此之謂與玄珠外藥也先天真元也真陽火也鉛遇癸生也於斯之時宜當於靜方可採取歸來自覺丹田火熾兩腎氣暖三關升降一氣冲和醍醐灌頂甘露灑心內景無窮筆難盡述先天氣生即一陽動時更生天地別立乾坤回陽換骨之時也人自父母媾精胎形十月漸滿氣足形全而生身其一點靈光元陽之氣已含於內既有此身則陰係陽五行之內死生貴賤莫能逃也既得先天真陽歸於身內假作爐鼎與後天真陰交媾二氣氤氳結成仙胎返煉五行逆施造化當三萬刻工夫不差毫髮方得火候不滅絲毫須要十月功成脫胎飛升五行不能拘陰陽不能陶通身陰濁盡化純陽跳出樊籠散蕩逍遙無窮矣卻從煉已純熟方得先天造化玄珠成象太乙含真形神俱妙與道合真此皆自然而然不假一毫作為也重陽注曰二六時中逆而修之不順熟境動持道念目不隨色順境耳不隨聲逐境鼻不隨香臭境舌不隨味美境身不隨觸欲境意不隨情熟境覺而常照照而常寂如斯不順人情熟境久久自然天理純真煉已即煉心也心為離離者已土也煉心不動即離宮修定定則氣和和則身安安則精氣充滿滿則鉛汞凝結結則造化自有玄珠成象太乙含真金液煉形骨散寒瓊形神俱妙與道合真皆自然也若非操存謹守降心煉性必無自致之理然此工夫必加勇猛決烈之心捨死忘生之志乃可純熟矣心死方得神活此之謂也五篇靈文玉液章第一神不離氣氣不離神呼吸往來歸乎一源不可著體不可運用委志虛無寂然常照身心無為而神氣自然有所為猶天地無為萬物自然化育重陽注曰先天一氣自虛無中來二氣相交自然神抱於氣氣抱於神先後二天之氣相交相得者渾如醉夢自然而然無一毫作為也吸則氣呼則神神呼氣吸上下往來復歸於本源煉結成丹為之胎身心大定無為而神氣自然有所為委志虛無不可存想猶如天地之定靜自然陽升陰降日往月來而造萬物也工夫已久靜而生定神入氣中氣與神合五行四象自然攢簇精凝氣結此坎離交媾初靜之功純陰之下須用陽火煅煉方得真氣發生神明自來矣重陽注曰煉已純熟工夫靜久自然神氣交合神屬南方火火在卦為離精屬北方水水在卦為坎魂屬東方木木在卦為震魄屬西方金金在卦為兌意屬中央土土在卦為坤名曰中宮黃庭先天玄關為乾既神與氣合神入氣中自然五行四象攢簇是為坎離交媾之功也純陰用火謂凝神下照坤宮杳杳冥冥而得真氣發生神明自來謂一陽生而為復也産藥章第二神守坤宮真火自來坤宮乃産藥川源陰陽交媾之處重陽注曰坤宮乃人身中黃庭宮是也即心下腎上肝西肺東內腎之前臍輪之後中虛之竅真氣發生之所人自父母胞胎一身之精粹其連如環其白如練先生三元後生兩腎兩腎既生漸生兩目後生兩外腎三才既全五臟六腑四肢百骸漸次而生此一竅乃祖氣之宮故曰坤宮坤乃承載萬物之謂也實為産藥川源之處陰陽交媾之所也神守坤宮要晝夜之閒時刻不離元神下照回光靜定逆施造化撥轉天關大藥自此而生金丹由是而結也若不得真火煅煉則金水混融若不專心致志則陽火散漫大藥終不能生先天何由而得煅煉之久水見火則自然化為一氣薰蒸上騰河車搬運周流不息真精自此而生元氣胚胎於此呼吸相含脈住氣停靜而生定大定之中先天一氣自虛無中而來是以先天母氣而伏後天子氣順其自然不可欲速先天自發也重陽注曰坤宮之火曰真人之火也常以神照坤宮煅煉陰陽精化為氣專心致志於行住坐臥之間皆可隨意守之不可散亂日久而不見其功者皆因心中雜亂若煅煉之久精得火煉自然化為一氣日久三震響上泥丸化為甘露降下重樓凝為精液復歸坤位胚胎元氣漸漸壯旺神呼氣吸自然含育周流不息氣脈以停而入靜定大定之中忽然而動乃先天一氣發生自乾宮而來如母戀子自然感合神變莫測聽其自然不可欲速時至氣化自然見其功效也天光者神光也工夫久靜神光照燭靜則神靈表裏透徹發現於外色象不能礙愛欲不能障自然隔牆見物預知前世矣混沌之初天地未判玄黃相雜時至氣化定中生動只這動處方知造化若有一物或明或隱不內不外此是大藥始萌不可遽採之若有一毫念起天真遂喪矣重陽注曰天之輕淸在上其色玄地之重濁在下其色黃天地未判之前渾淪一氣玄黃不分淸濁未定混而為一時至氣化淸氣上浮為天濁氣下凝為地地氣上升天氣下降二氣氤氳化生萬物淸淨之功亦然先天真陽與後天真陰陰陽混一猶如天地玄黃相雜忽然定中生動造化自現如天地一判別立乾坤是也若有一物或明或隱乃玄珠成象也此玄珠似乎在外閉目甚分明似乎在內開眼卻淸白有象他人不能見無象獨自見分明故曰無象玄珠乃是大藥之苗始生其藥尚嫩故不可採若有妄念採之必失玄珠喪卻天真至寶反成魔狂呼吸亂奔不可救也命寶不可輕弄其斯之謂也採藥章第三神守乾宮真氣自歸乾宮乃造化之源生身受氣之初知之修煉謂之聖人重陽注曰坤宮屬地為陰應人後天有終之形乾宮屬天為陽應人先天無始之神乾宮乃虛無玄關一竅是也實為造化之源自無而有謂之造自有而無謂之化由造而化也始則受氣於虛無一竅而生終則散精於幻妄六賊而死造化循環不知幾萬劫矣始則凝神於坤煅煉陰精化為陽氣薰蒸上騰河車搬運周流不息次則凝神於乾漸煉漸凝漸聚漸結結成一顆玄珠大如黍米恆在目前一得永得先天虛無真氣自然歸之待其鉛光閃爍如月之象汞氣飛揚如日之象不時日月交合一處一點靈光圓陀陀光爍爍照耀上下內真外應先天之氣自虛無中而來是以母氣而伏子氣自然感合造化之妙藥從外來非假存想重陽注曰人稟天地陰陽二氣以生真陽之氣在身為鉛為精為坎真陰之氣在心為汞為神為離象曰人與天地之氣同體是也修真之士既得大藥始萌玄珠成象而內精神壯旺當此之際神中之精下交於坎精中之神上交於離內則精神交合於內外則陰陽交合於外內外明徹照耀上下化為一顆明珠圓陀陀光爍爍三關升降上下旋轉如輪周流不息如斯象景是內之精神和合金木交併水火激發之際是內有真實故外應其景象也若非親造真境豈能有此哉先天之氣母氣也後天之氣子氣也自然感合返斯造化之妙始得藥從外來母氣天氣也子氣人氣也人能常淸靜天地悉皆歸天氣歸一身皆成自然人還將上天氣以制九天魂此同類之謂也先坤後乾者又名移爐換鼎是也此乃金丹之真竅妙先天火候之祕訣也初煉丹時便向水中求之終落頑空畢竟無成須以我之真氣而感天地之至精當以陽燧方諸水火感通之理推之自得重陽注曰初煉丹時先須神照坤宮以火煉藥以神馭氣待真氣發生後守乾宮懸胎鼎內結成玄珠煉成大藥吞入腹中點化己之陰氣變成乾陽之體此空中之妙用也時人不悟真空之妙用不遇至人之傳授道聽途說盲修瞎煉便向水中求之水者杳冥之謂也忘念忘體於杳冥之中豈不落於頑空乎必竟終無成丹之理也當以陽燧方諸水火感通之理推之自得陽燧火珠也太陽正宮以火珠向日燧之方諸水珠也太陰正宮以水珠向月珠之天地懸隔之遠一刻之中自然得水火也彼物受氣之遍尚能感通日月得水火於頃刻之間何况人為萬物之靈根乎靜定之中豈不感通身中妙化而結成金丹也哉當其日月交光之候先天適至之時泥丸風生欲海波澄此身如在萬丈海中不知有水不知有火不知有天地人我渾如醉夢正是龍虎交會之際金木相啖水火相激景象發現迅如雷電急急採取其採取之妙如發千鈞之弩惟用一寸之機似採非採不採實採乃為真採也重陽注曰不知如醉此是得藥之景象也當其玄珠成象日月交光正是採藥之時先天適至之候當此之時泥丸自覺風生從天吹下灌入玄關兩目之中徑通周身關竅齊開骨節如斷酸軟如綿心冷如冰丹田如火身心缺爽愼勿恐布正是水火烹蒸激潑之時龍虎金木交會之際少刻三宮氣滿二氣冲和塵情盡絶神氣泰定恍如醉夢猶如萬水萬火互相感激不知有天地人我只聞千鍾雷鳴萬道霞光靈明內外琳琅滿空雷轟電掣撼通乾坤採藥歸來這個妙用如半寸之機發千鈞之弩一旋之水斡萬斛之舟經云人發殺機天地反覆乃真機之妙用也又云月到天心處風來水面時又云楊柳風來面上吹梧桐月向懷中照泥丸風淸絳宮月朗林閒嫩風淸一派天音降之句皆形容先天一氣自外而來也得藥章第四神守玄宮意迎牝府神意相合先天自得恍恍惚惚杳杳冥冥一點紅光閃入下元已之真氣吸然湊合陰乃抱陽陽乃激陰至精發現海泛浪湧自太玄關升入泥丸化為金液吞入腹內香甜淸爽萬孔生春遍體生光至此乃是乾坤交媾一得永得之妙全在防危慮險即當牢封固閉勿令滲漏以便溫養重陽注曰玄宮即玄關也煉黍米之所也又云懸胎鼎硃砂鼎乾坤鼎皆異名也前言乾坤所謂初煉丹以乾坤為鼎器先凝神聚於坤位靜中生動採陰中之陽名曰兔髓真氣上騰升上乾宮動而後靜合陽中之陰名曰烏肝二物混融煉成如意之珠所謂坎離交媾癸花發現真鉛初露先天初現一陽初動之時如初三日月出庚方之象正所謂活子時也一時分作六候二候得藥四候別有妙用此時是得藥之初一候既得初一候之藥宜當深入靜室運天然之火再入兌丁半輪之月現此時有龍吟虎嘯之聲鉛汞恐有滲漏全在洗心滌慮沐浴隄防漸過十三日而生乾甲即十五日是也此日圓滿乾坤之時也鄞鄂已成玄牝已立金花已現三陽已備之時月圓滿於甲方應乾之象恐其金逢望遠正是日月重明之際再得藥之候二候得藥也四候別有妙用之法為前半月之象半輪明月之內有龍吟虎嘯之聲要慮險防危之妙用也仙胎已成之後月到十八一陰巽方守城野戰之妙用也次煉二陰下弦二十三艮地洗心沐浴之妙用也煉盡三陰陽神出現隄防固濟之妙用也此名前三三後三三四候之妙用也二候得藥之理也神守玄宮意迎牛癿白府此二句是採藥之口訣當其玄宮之中至精發生真鉛之氣發現一輪明月之象真汞之火發現一輪紅日之象日月之中各發金花二朵壯如丹山金紅赤色斯時正不老不嫩急急採取何採何取訣曰只是意迎牛癿白府自然杳杳冥冥恍恍惚惚一點紅光閃入下元交會真陰陰乃吸然湊合陰乃激陽陽乃抱陰陰陽激潑海浪泛湧自太玄關至尾閭夾脊過玉枕化為金液瓊漿吞入腹內香甜淸爽耳聽鼓聲萬顆雷鳴鈞天妙藥非琴非瑟非笛非簫別是一般妙音似寒泉潄玉似金磬搖空似秋蟬拽緒似風鼓靑松非常之異琳琅振響有羣鴉齊噪之聲衆鳥頻伽之韻口涵目驚心歡意悅誠為極樂之邦實乃天宮妙境塵寰俗客如瞽如聾身心清靜百關和暢萬孔生春遍體生出萬道霞光現一圓光內有嬰兒之象乃陽神出象也全在防危慮險不可遠離溫養之法注見下文溫養章第五神守黃房金胎自成黃房乃乾之下坤之上規中之妙十二時中念茲在茲含光藏耀行住坐臥綿綿若存如雞抱卵如龍養珠抱元守一先天元神元氣刻刻相合漸漸相化但安神息不運火而火自運百日功靈十月胎圓陰魄自化陽神出現千日之後溫養火足剝盡羣陰體變純陽嬰兒現象身外有身形如煙霞神同太虛隱則形同於神顯則神同於氣步日月而無影貫金石而無礙溫養三年之後嬰兒老成不可遠離直至九年與太虛同體形神俱妙與道合真天地山川有時崩壞惟吾之道體浩劫長存濳伏人間積功立行提挈天地把握陰陽所以陰陽不能鋾鑄也天仙之道斯乃畢矣重陽注曰黃房即黃庭宮也故為乾之下坤之上規矩之中也金胎即仙胎也金乃堅剛不壞之物此乃人之元神也此元神不壞不朽淸靜妙明之體如金之堅如剛之利淨如琉璃光如滿月存不虧明因一念之妄緣於幻化今既修五篇之口訣得返還之丹道要煉有合無投黑結紅而成仙胎返本來之真常合元始之妙用金胎自成規中之妙以神守之黃房之中一意不散十二時中念茲在茲含光藏耀斂視收聽綿綿若存不可須臾離也如雞抱卵如龍養珠龍養項下之珠心意不忘精神感化其珠有光生光既久珠成小龍飛騰太空或收或放時人見之是為龍象乃龍之神也神全變化興雲致雨脫骨飛騰是謂神龍所以能大能小可濳可顯動則裂泰山發洪浪興雲起霧掣電轟雷靜則隱藏淵泉是陽靈之物金丹之道學天仙者亦如此理也初則抱元守一養先天黍米元神妙珠度人經云元始天尊懸一寶珠去地五丈於空懸之中萬聖千真從珠口中出渤渤然後從珠口中入存養之久自然元神黍米劫劫相會漸漸相化新月娥眉次而半輪上弦漸至滿月之圓自有金光發現日月合璧鉛汞相投結成仙胎溫養三年嬰兒老成直至九年功圓行滿陰滓盡消一神可化百神萬神形神俱妙出有入無煉神與太虛同體返乎無極之真道合乎元始之妙境觀天地在玄妙中如太倉一粒黍太虛一片雲耳有何五行拘係也有何陰陽變化也於斯天地由吾提挈陰陽由吾把握永無終始浩劫長存與道合真神哉神哉最上一乘妙訣重陽祖師心傳淸虛子録夫最上者以太虛為鼎太極為爐淸靜為妙用無為為丹基性命為鉛汞定慧為水火以自然造化為真種子以勿忘勿助為火候洗心滌慮為沐浴存神定息為固濟戒定慧為三要先天之中為玄關明心為應驗見性為凝結三元混合為聖胎打成一片為丹成身外有身為脫胎打破虛空為了當此最上一乘之妙道三教同源之心法上士行之不怠直超聖域頓悟圓通形神俱妙與道合真逍遙極樂永劫不壞即大覺金仙之位也至道原來不易傳窮微究理了塵緣山頭水降黃芽長地下雷升白雪填慧月涓涓澄碧沼玄風細細捲靑煙木性金情相交合便是虛無太極圈
